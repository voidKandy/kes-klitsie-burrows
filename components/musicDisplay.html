<template id="music-display-template">
  <style>
    .wrapper {
      position: relative;
      display: flex;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      max-width: 400px;
      overflow: hidden;
      box-shadow: 1px 3px 3px light-dark(rgba(0, 0, 0, 0.4), rgba(200, 200, 200, 0.4));
      border: 3px double light-dark(var(--light-border), var(--dark-border));
      transition: all 200ms ease-in, all 400ms ease-out;
    }

    .wrapper:hover {
      transform: scale(1.003);
      box-shadow: 2px 4px 2px light-dark(rgba(0, 0, 0, 0.5), rgba(200, 200, 200, 0.5));
    }

    .background-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-size: cover;
      background-position: center;
      filter: blur(15px);
      opacity: 1;
    }

    .container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-content: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
      z-index: 1;
      flex-grow: 1;
    }

    .container img {
      max-width: 100%;
      border-radius: 8px;
    }

    .container a {
      text-decoration: none;
      color: #1db954;
      font-weight: bold;
    }

    .container a:hover {
      text-decoration: underline;
    }

    .container h3 {
      display: inline-block;
      color: var(--secondary-red);
      text-shadow: 1px 1px 0px var(--offblack);
    }

    .container h3:hover {
      color: var(--tertiary-blue);
    }

    .container h4 {
      margin-top: 5px;
      font-size: 12px;
      color: var(--offwhite);
    }

    .title-and-release {
      margin: 1rem 0;
      background-color: rgba(0, 0, 0, 0.2);
      padding: 0.5rem;
      border-radius: 8px;
    }
  </style>

  <div class="wrapper">
    <div class="background-container"></div>
    <div class="container">
      <div class="title-and-release">
        <a href="#" target="_blank">
          <h3></h3>
        </a>
        <h4></h4>
      </div>
      <img src="" alt="Music image" />
    </div>
  </div>
</template>

<script>
  class MusicDisplay extends HTMLElement {
    constructor() {
      super();
      const template = document.getElementById('music-display-template').content.cloneNode(true);
      this.attachShadow({mode: 'open'}).appendChild(template);
    }

    connectedCallback() {
      const wrapper = this.shadowRoot.querySelector(".wrapper");
      const backgroundContainer = this.shadowRoot.querySelector(".background-container");
      const container = this.shadowRoot.querySelector(".container");
      const titleLink = this.shadowRoot.querySelector(".title-and-release a");
      const title = this.shadowRoot.querySelector(".title-and-release h3");
      const release = this.shadowRoot.querySelector(".title-and-release h4");
      const img = this.shadowRoot.querySelector("img");

      backgroundContainer.style.backgroundImage = `url("${this.image}")`;

      title.textContent = this.name;
      titleLink.href = this.spotify_url;
      release.textContent = this.release;
      img.src = this.image;
      img.alt = this.name;
    }

    get name() {
      return this.getAttribute("name") || "Unknown";
    }

    get image() {
      return this.getAttribute("image") || "";
    }

    get release() {
      return this.getAttribute("release") || "Unknown Release";
    }

    get spotify_url() {
      return this.getAttribute("spotify_url") || "#";
    }
  }

  customElements.define('music-display', MusicDisplay);
</script>
