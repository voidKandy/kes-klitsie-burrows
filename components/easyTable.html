<template id="easy-table-template">
  <style>
    table {
      border-collapse: collapse;
      border: 5px inset light-dark(var(--light-border), var(--dark-border));
      background-color: light-dark(var(--offwhite), var(--offblack));
      margin: 0 auto;
      width: auto;
    }

    table tr:first-child th {
      font-size: 1.5rem;
      padding: 0.5rem;
      background-color: light-dark(var(--tertiary-blue), var(--secondary-red));
      filter: grayscale(10%);
      color: light-dark(var(--light-color), var(--dark-color));
    }

    table td {
      padding: 1rem;
    }

    table tr {
      border-bottom: 1px solid light-dark(var(--light-border), var(--dark-border));
    }

    table tr td:first-child {
      vertical-align: top;
      font-size: 1.2rem;
      font-weight: 900;
      color: light-dark(var(--light-color), var(--dark-color));
    }

    table tr:not(:first-child) td:last-child {
      text-align: right;
      gap: 1rem;
    }

    h4.has-link {
      transition: all ease-in-out 100ms;
    }

    h4.has-link:hover {
      color: light-dark(var(--tertiary-blue), var(--secondary-red));
    }

    h4 {
      text-decoration: underline;
      text-align: right;
      color: light-dark(var(--secondary-red), var(--tertiary-blue));
    }
  </style>
  <table>
    <tr>
      <th id="table-header" colspan="2"></th>
    </tr>
    <tbody id="table-body"></tbody>
  </table>
</template>

<script>
  class EasyTable extends HTMLElement {
    constructor() {
      super();
      const template = document.getElementById("easy-table-template").content.cloneNode(true);
      this.attachShadow({mode: "open"}).appendChild(template);
    }

    connectedCallback() {
      const header = this.getAttribute("header") || "Untitled Table";
      this.shadowRoot.getElementById("table-header").textContent = header;

      const tableBody = this.shadowRoot.getElementById("table-body");

      Array.from(this.attributes).forEach(attr => {
        if (attr.name.startsWith("row-")) {
          const rowLabel = attr.name.replace("row-", "").replaceAll("-", " ");
          const rowValues = this.getAttributeValues(attr.name);
          if (rowValues) {
            tableBody.appendChild(this.buildTableRow(rowLabel, rowValues));
          }
        }
      });
    }

    /**
     * @param {string} rowName
     * @param {Array<{value: string, link: string}>} values
     * @returns {HTMLTableRowElement}
     */
    buildTableRow(rowName, values) {
      const row = document.createElement("tr");

      const leftCell = document.createElement("td");
      leftCell.textContent = rowName;
      row.appendChild(leftCell);

      const rightCell = document.createElement("td");
      values.forEach(({value, link}) => {
        const tableName = document.createElement("h4");
        tableName.textContent = value;

        if (link) {
          const tableLink = document.createElement("a");
          tableLink.href = link;
          tableLink.target = "_blank";
          tableLink.style.textDecoration = "none";
          tableLink.appendChild(tableName);
          tableName.classList.add("has-link");
          rightCell.appendChild(tableLink);
        } else {
          rightCell.appendChild(tableName);
        }
      });

      row.appendChild(rightCell);
      return row;
    }

    /**
     * @param {string} name - Attribute name
     * @returns {Array<{value: string, link: string | null}> | null}
     */
    getAttributeValues(name) {
      const content = this.getAttribute(name);
      if (!content) return null;

      return content.split(",").map(val => this.parseInput(val.trim()));
    }

    /**
     * Parses an input string of the format `<value>:<link>`
     * @param {string} str
     * @returns {{ value: string, link: string | null }}
     */
    parseInput(str) {
      const match = str.match(/^([^:\s]+)(?::\s*(\S+))?$/);
      if (match) {
        let value = match[1].trim().replaceAll("-", " ");
        let link = match[2] ? `https://${match[2].trim()}` : null;
        return {value, link};
      }
      return {value: str.trim(), link: null};
    }
  }

  customElements.define("easy-table", EasyTable);
</script>
